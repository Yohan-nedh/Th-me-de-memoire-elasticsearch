input {

  # --- NVD : CVE toutes les 30 minutes ---
  http_poller {
    urls => {
      nvd_recent => {
        method => "get"
        url => "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=20&startIndex=0"
        headers => { "Accept" => "application/json" }
      }
    }
    schedule => { "every" => "30m" }
    codec => "json"
    type => "nvd_cve"
    request_timeout => 60
  }

  # --- CISA KEV : exploits toutes les 24h ---
  http_poller {
    urls => {
      cisa_kev => {
        method => "get"
        url => "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json?limit=100"
        headers => { "Accept" => "application/json" }
      }
    }
    schedule => { "every" => "24h" }
    codec => "json"
    type => "cisa_kev"
    request_timeout => 60
  }

  # --- Filebeat depuis Metasploitable3 ---
  beats {
    port => 5045
  }

}

filter {

  if [type] == "nvd_cve" {
    split { field => "[vulnerabilities]" }
    mutate {
      rename => {
        "[vulnerabilities][cve][id]"                                                 => "cve_id"
        "[vulnerabilities][cve][descriptions][0][value]"                             => "description"
        "[vulnerabilities][cve][metrics][cvssMetricV31][0][cvssData][baseScore]"     => "cvss_score"
        "[vulnerabilities][cve][metrics][cvssMetricV31][0][cvssData][baseSeverity]"  => "severity"
        "[vulnerabilities][cve][published]"                                          => "published_date"
        "[vulnerabilities][cve][lastModified]"                                       => "last_modified"
      }
    }
    if [cvss_score] and [cvss_score] >= 9.0 {
      mutate { add_tag => ["critical_vulnerability"] }
    }
    mutate { remove_field => ["vulnerabilities", "headers"] }
  }

  if [type] == "cisa_kev" {
    split { field => "[vulnerabilities]" }
    mutate {
      rename => {
        "[vulnerabilities][cveID]"                       => "cve_id"
        "[vulnerabilities][vendorProject]"               => "vendor"
        "[vulnerabilities][product]"                     => "product"
        "[vulnerabilities][vulnerabilityName]"           => "vulnerability_name"
        "[vulnerabilities][dateAdded]"                   => "date_added_kev"
        "[vulnerabilities][shortDescription]"            => "description"
        "[vulnerabilities][requiredAction]"              => "required_action"
        "[vulnerabilities][dueDate]"                     => "due_date"
        "[vulnerabilities][knownRansomwareCampaignUse]"  => "ransomware_use"
      }
    }
    mutate {
      add_tag => ["actively_exploited"]
      remove_field => ["vulnerabilities", "headers"]
    }
  }

  # --- Traitement logs Metasploitable3 ---
  if [type] != "nvd_cve" and [type] != "cisa_kev" {

    # Forcer le timestamp à la date d'ingestion
    ruby {
      code => "event.set('@timestamp', LogStash::Timestamp.now)"
    }

    if [log][file][path] =~ "auth.log" {
      grok {
        match => {
          "message" => "%{SYSLOGTIMESTAMP:timestamp} %{HOSTNAME:hostname} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:auth_message}"
        }
      }
      if "Failed password" in [auth_message] {
        mutate { add_tag => ["ssh_failed_login", "security_alert"] }
      }
      if "Accepted password" in [auth_message] {
        mutate { add_tag => ["ssh_success_login"] }
      }
      if "Invalid user" in [auth_message] {
        mutate { add_tag => ["ssh_invalid_user", "security_alert"] }
      }
    }
  }

}

output {

  if [type] == "nvd_cve" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "elastic123"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "nvd-cve-%{+YYYY.MM}"
    }
  }

  else if [type] == "cisa_kev" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "elastic123"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "cisa-kev-%{+YYYY.MM}"
    }
  }

  else {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "elastic123"
      ssl_enabled => true
      ssl_verification_mode => "none"
      index => "syslog-metasploitable-%{+YYYY.MM.dd}"
    }
  }

}
